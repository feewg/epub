# 网络小说配置
# 适合在线下载的小说格式

# 书籍信息
bookname: "网络小说示例"
author: "网络作者"

# 网络小说通常有更宽松的章节匹配
chapter_match: "^第[0-9一二三四五六七八九十零〇百千两 ]+[章回节集幕卷部]|^[Ss]ection.{1,20}$|^[Cc]hapter.{1,20}$|^[Pp]age.{1,20}$|^\\d{1,4}$|^\\d+、$|^引子$|^楔子$|^章节目录|^章节|^序章|^最终章 \\w{1,20}$|^番外\\d?\\w{0,20}|^完本感言.{0,4}$"
volume_match: "^第[0-9一二三四五六七八九十零〇百千两 ]+[卷部]"
exclusion_pattern: "^第[0-9一二三四五六七八九十零〇百千两 ]+(部门|部队|部属|部分|部件|部落|部.*：$)"

# 标题最大字数（网络小说章节名通常较长）
max_title_length: 50

# 段落缩进
indent: 2

# 对齐方式
align: "center"

# 更大的行间距，适合屏幕阅读
paragraph_spacing: "1em"
line_height: "2.0"

# 护眼主题，适合长时间阅读
theme: "sepia"

# 语言
lang: "zh"

# 分离章节序号
separate_chapter_number: true

# 不添加教程
add_tips: false

# CSS 变量 - 优化阅读体验
css_variables:
  primary-color: "#333333"
  background-color: "#f4ecd8"
  font-size: "20px"
