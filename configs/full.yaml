# kaf-cli 完整配置
# 包含所有可配置项

# ====================
# 书籍信息
# ====================
bookname: "完整示例"
author: "完整作者"

# ====================
# 章节识别
# ====================
chapter_match: "^第[0-9一二三四五六七八九十零〇百千两 ]+[章回节集幕卷部]|^[Ss]ection.{1,20}$|^[Cc]hapter.{1,20}$|^[Pp]age.{1,20}$|^\\d{1,4}$|^\\d+、$|^引子$|^楔子$|^章节目录|^章节|^序章|^最终章 \\w{1,20}$|^番外\\d?\\w{0,20}|^完本感言.{0,4}$"
volume_match: "^第[0-9一二三四五六七八九十零〇百千两 ]+[卷部]"
exclusion_pattern: "^第[0-9一二三四五六七八九十零〇百千两 ]+(部门|部队|部属|部分|部件|部落|部.*：$)"
max_title_length: 35

# ====================
# 排版设置
# ====================
indent: 2
align: "center"
paragraph_spacing: "0.5em"
line_height: "1.8"

# ====================
# 输入输出
# ====================
input_format: "auto"  # auto, txt, markdown
format: "epub"        # epub, all
output_name: null     # 自定义输出文件名
lang: "zh"

# ====================
# 外观设置
# ====================
theme: "light"
separate_chapter_number: false

# 封面设置
# cover:
#   type: local
#   path: "cover.jpg"

# 字体设置
# font: "font.ttf"

# ====================
# 高级 CSS
# ====================

# 自定义 CSS 文件路径
# custom_css: "custom.css"

# 扩展 CSS（内联）
# extended_css: |
#   body {
#     font-family: "Noto Serif SC", serif;
#   }
#   h3.chapter-title {
#     color: #8b4513;
#   }

# CSS 变量
css_variables:
  primary-color: "#333333"
  background-color: "#ffffff"
  accent-color: "#0066cc"
  border-color: "#dddddd"

# ====================
# 其他
# ====================
add_tips: false
